{% extends 'base.html' %} {% block title %}Ajukan Surat - SiPelDes{% endblock %}
{% block page_title %}Ajukan Surat Baru{% endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm border-0 p-4">
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-bold"
            >Jenis Surat <span class="text-danger">*</span></label
          >
          <select name="jenis_surat" class="form-select" required>
            <option value="">-- Pilih Jenis Surat --</option>
            {% for j in jenis_list %}
            <option value="{{ j }}">{{ j }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold"
            >Keperluan <span class="text-danger">*</span></label
          >
          <textarea
            name="keperluan"
            class="form-control"
            rows="4"
            placeholder="Jelaskan keperluan pengajuan surat ini..."
            required
          ></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Lampiran Dokumen</label>
          <input
            type="file"
            name="lampiran"
            class="form-control"
            accept=".pdf,.jpg,.jpeg,.png"
          />
          <div class="form-text">
            Format: PDF, JPG, PNG. Maks 16MB. (Contoh: KTP, KK)
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-send"></i> Kirim Pengajuan
          </button>
          <a
            href="{{ url_for('surat.list_surat') }}"
            class="btn btn-outline-secondary"
            >Batal</a
          >
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
